<!DOCTYPE html>
<html>
<head>
  <title>Secret Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      overflow: hidden;
    }

    /* LOCK SCREEN */
    #lockScreen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: black;
      color: white;
    }

    .photos {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 80%;
      max-width: 400px;
    }

    .photos img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }

    #showPassBtn {
      margin-top: 20px;
      padding: 12px 28px;
      border-radius: 25px;
      border: none;
      background: #25D366;
      color: white;
    }

    #passwordArea {
      display: none;
      margin-top: 15px;
    }

    #passwordInput {
      padding: 12px;
      width: 200px;
      border-radius: 6px;
      border: none;
      text-align: center;
    }

    #enterBtn {
      margin-top: 10px;
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      background: #075E54;
      color: white;
    }

    /* CHAT */
    #chatPage {
      display: none;
      height: 100vh;
      background: #ece5dd;
      flex-direction: column;
    }

    #chatHeader {
      background: #075E54;
      color: white;
      padding: 10px;
      text-align: center;
    }

    #chatBox {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      max-width: 70%;
      padding: 8px 12px 18px;
      margin-bottom: 6px;
      border-radius: 8px;
      position: relative;
      font-size: 14px;
    }

    .me {
      background: #dcf8c6;
      margin-left: auto;
    }

    .friend {
      background: #cfe9ff;
      margin-right: auto;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #f0f0f0;
    }

    #messageInput {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
    }

    #sendBtn {
      margin-left: 8px;
      border-radius: 50%;
      border: none;
      padding: 10px 15px;
      background: #25D366;
      color: white;
    }
  </style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="photos">
    <img src="photo1.png">
    <img src="photo2.png">
    <img src="photo3.png">
    <img src="photo4.png">
  </div>

  <button id="showPassBtn" onclick="showPasswordBox()">🔒 Unlock</button>

  <div id="passwordArea">
    <input id="passwordInput" type="password" placeholder="Enter Password">
    <br>
    <button id="enterBtn" onclick="checkPassword()">Enter</button>
  </div>
</div>

<!-- CHAT PAGE -->
<div id="chatPage">
  <div id="chatHeader">🔒 Secret Chat</div>

  <div id="chatBox"></div>

  <div id="inputArea">
    <input id="messageInput" placeholder="Type a message...">
    <button id="sendBtn">➤</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getFirestore, collection, addDoc, onSnapshot,
    query, orderBy, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyGff0FxzbkRBNFvQwNvJpERnRdLVg-",
    authDomain: "live-chat-9016a.firebaseapp.com",
    projectId: "live-chat-9016a",
    storageBucket: "live-chat-9016a.appspot.com",
    messagingSenderId: "687453441605",
    appId: "1:687453441605:web:0f0a5b9b61afca40dd2c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const messageInput = document.getElementById("messageInput");
  const chatBox = document.getElementById("chatBox");
  const sendBtn = document.getElementById("sendBtn");

  let myId = localStorage.getItem("myId");
  if (!myId) {
    myId = Math.random().toString(36).substring(2);
    localStorage.setItem("myId", myId);
  }

  /* PASSWORD */
  window.showPasswordBox = () => {
    document.getElementById("passwordArea").style.display = "block";
    document.getElementById("showPassBtn").style.display = "none";
  };

  window.checkPassword = () => {
    if (document.getElementById("passwordInput").value === "9677") {
      document.getElementById("lockScreen").style.display = "none";
      document.getElementById("chatPage").style.display = "flex";
      document.body.style.overflow = "auto";
    } else {
      alert("Wrong password ❌");
    }
  };

  /* RECEIVE */
  const q = query(collection(db, "messages"), orderBy("time"));
  onSnapshot(q, snap => {
    chatBox.innerHTML = "";
    snap.forEach(d => {
      const data = d.data();
      const div = document.createElement("div");

      div.className = "msg " + (data.sender === myId ? "me" : "friend");
      div.textContent = data.text;

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });

  /* SEND (FIXED) */
  async function sendMessage() {
    try {
      const text = messageInput.value.trim();
      if (!text) return;

      console.log("Sending:", text);

      await addDoc(collection(db, "messages"), {
        text: text,
        sender: myId,
        time: serverTimestamp()
      });

      messageInput.value = "";
      console.log("Sent ✅");

    } catch (err) {
      console.error(err);
      alert("Error: " + err.message);
    }
  }

  sendBtn.addEventListener("click", sendMessage);

  messageInput.addEventListener("keypress", e => {
    if (e.key === "Enter") sendMessage();
  });

</script>

</body>
</html>
